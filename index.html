<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>天梯的挑戰</title>

  <meta
    name="description"
    content="兒童主日學互動網頁遊戲：爬梯圖（鬼腳圖），從下方出發，透過點選橫桿一步一步走向天國。"
  />

  <!-- 主樣式 -->
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <div class="app">

    <!-- =====================
         HEADER
    ====================== -->
    <header class="top">
      <div class="brand">
        <div class="logo">☁️✨</div>
        <div class="titles">
          <h1>天梯的挑戰</h1>
          <p>
            從<b>下方出發</b>，一步一步往上走。
            在每個岔路作出選擇，只有一條路會到 <b>✨天國</b>。
          </p>
        </div>
      </div>

      <div class="actions">
        <button
          id="btnNew"
          class="btn btn-secondary"
          aria-label="換一張新地圖"
        >🗺️ 換一張新地圖</button>

        <!-- ✅ 難易度控制（老師現場操作用） -->
        <label class="difficulty">
          🎚️ 難度：
          <select id="difficultySelect" aria-label="選擇遊戲難度">
            <option value="easy">🌱 簡單</option>
            <option value="normal" selected>🔵 普通</option>
            <option value="hard">🔥 困難</option>
          </select>
        </label>

        <!-- ✅ 提示開關 -->
        <button
          id="btnHint"
          class="btn btn-tertiary"
          aria-label="切換提示模式"
        >💡 提示：開</button>

        <button
          id="btnGo"
          class="btn btn-primary"
          aria-label="出發走走看"
        >🚶 出發！走走看</button>
      </div>
    </header>

    <!-- =====================
         MAIN
    ====================== -->
    <main class="card">

      <!-- 起點選擇 -->
      <section class="picker">
        <div class="pickerTitle">選擇起點角色（下方）：</div>
        <div id="choices" class="chips" role="list"></div>

        <!-- 只提供「操作說明」，不即時給提醒 -->
        <div class="tip" id="tip">
          點選角色後按「出發」，走到岔路時請點選橫桿。
        </div>
      </section>

      <!-- 遊戲畫布 -->
      <section class="stage">
        <canvas
          id="game"
          aria-label="爬梯圖遊戲畫布"
        ></canvas>
      </section>

      <!-- 下方訊息區：固定為課程主題，不做即時提醒 -->
      <section class="message" id="message">
        <div class="messageTitle">🎯 今天的挑戰</div>
        <div class="messageBody">
          從下方出發，找到通往 <b>✨天國</b> 的那條路！<br />
          <span class="verse">
            主題經文：使徒行傳 1:1–11（耶穌升天、應許聖靈、將來再來）
          </span>
        </div>
      </section>

    </main>

    <!-- =====================
         FOOTER
    ====================== -->
    <footer class="footer">
      <span>Made for Kids ✿ 主日學互動體驗</span>
    </footer>
  </div>

  <!-- =====================
       終點結果彈窗
       （走到終點才出現）
  ====================== -->
  <dialog
    id="resultDialog"
    class="dialog"
    closedby="any"
    aria-labelledby="dialogTitle"
    aria-describedby="dialogDesc"
  >
    <div class="dialogInner">
      <div class="dialogHeader">
        <div class="dialogIcon" id="dialogIcon">✨</div>
        <div class="dialogTitleWrap">
          <div id="dialogTitle" class="dialogTitle">結果</div>
          <div id="dialogDesc" class="dialogDesc">你走到了哪裡呢？</div>
        </div>
        <button
          id="dialogClose"
          class="dialogClose"
          type="button"
          aria-label="關閉"
        >✕</button>
      </div>

      <div class="dialogBody">
        <div id="dialogBody" class="dialogBodyText"></div>
      </div>

      <div class="dialogActions">
        <button
          id="dialogReplay"
          class="btn btn-primary"
          type="button"
        >再玩一次</button>
        <button
          id="dialogNewMap"
          class="btn btn-secondary"
          type="button"
        >換新地圖</button>
      </div>
    </div>
  </dialog>

  <!-- =====================
       主程式
  ====================== -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>
``

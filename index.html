<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>爬梯圖：去天國的路</title>
  <meta name="description" content="兒童主日學互動網頁遊戲：爬梯圖（鬼腳圖），起點在下方，透過點選橫桿確認路徑，明白通往天國的道路只有一條。" />
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="logo">☁️✨</div>
        <div class="titles">
          <h1>爬梯圖：去天國的路</h1>
          <p>
            <b>起點在下方</b>，<b>終點在上方</b>。走到岔路時點選橫桿，確認你走的路。
            只有一條路會到 <b>✨天國</b>。
          </p>
        </div>
      </div>

      <div class="actions">
        <button id="btnNew" class="btn btn-secondary" aria-label="換一張新地圖">🗺️ 換一張新地圖</button>
        <button id="btnHint" class="btn btn-tertiary" aria-label="切換提示模式">💡 提示：開</button>
        <button id="btnGo" class="btn btn-primary" aria-label="出發走走看">🚶 出發！走走看</button>
      </div>
    </header>

    <main class="card">
      <section class="picker">
        <div class="pickerTitle">選擇起點角色（下方）：</div>
        <div id="choices" class="chips" role="list"></div>
        <div class="tip" id="tip">
          小提示：星星走到岔路會停住～請點一下橫桿，幫它確認要走的路！
        </div>
      </section>

      <section class="stage">
        <canvas id="game" aria-label="爬梯圖遊戲畫布"></canvas>
      </section>

      <section class="message" id="message">
        <div class="messageTitle">🎯 今天的挑戰</div>
        <div class="messageBody">
          從下方出發，找到通往 <b>✨天國</b> 的那條路！<br/>
          <span class="verse">主題經文：使徒行傳 1:1–11（耶穌升天、應許聖靈、將來再來）</span>
        </div>
      </section>
    </main>

<!-- 結果彈窗：走到終點後才顯示 -->
<dialog id="resultDialog" class="dialog" closedby="any" aria-labelledby="dialogTitle" aria-describedby="dialogDesc">
  <div class="dialogInner">
    <div class="dialogHeader">
      <div class="dialogIcon" id="dialogIcon">✨</div>
      <div class="dialogTitleWrap">
        <div id="dialogTitle" class="dialogTitle">結果</div>
        <div id="dialogDesc" class="dialogDesc">你走到了哪裡呢？</div>
      </div>
      <button id="dialogClose" class="dialogClose" type="button" aria-label="關閉">✕</button>
    </div>

    <div class="dialogBody">
      <div id="dialogBody" class="dialogBodyText"></div>
    </div>

    <div class="dialogActions">
      <button id="dialogReplay" class="btn btn-primary" type="button">再玩一次</button>
      <button id="dialogNewMap" class="btn btn-secondary" type="button">換新地圖</button>
    </div>
  </div>
</dialog>

    <footer class="footer">
      <span>Made for Kids ✿ 主日學互動體驗</span>
    </footer>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
